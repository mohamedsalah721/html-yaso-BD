<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Yasmine ❤️</title>
    <style>
        /* Global Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Canvas for fireworks background */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Landing Section - Full Screen */
        #landing {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
            background: radial-gradient(circle at center, #1a0a0a 0%, #0a0a0a 100%);
        }

        /* Main Title */
        .title {
            font-size: 3rem;
            color: #ff0040;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 0, 64, 0.6);
            animation: glow 2s ease-in-out infinite alternate;
            padding: 0 20px;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 0, 64, 0.6); }
            to { text-shadow: 0 0 30px rgba(255, 0, 64, 0.9), 0 0 40px rgba(255, 0, 64, 0.4); }
        }

        /* Countdown Timer Styling */
        #countdown {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 40px;
            text-align: center;
            background: rgba(255, 0, 64, 0.1);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 0, 64, 0.3);
            backdrop-filter: blur(10px);
        }

        .countdown-item {
            display: inline-block;
            margin: 0 10px;
            text-align: center;
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: bold;
            color: #ff0040;
            display: block;
        }

        .countdown-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        /* Main Heart Styling */
        #mainHeart {
            font-size: 150px;
            color: #ff0040;
            cursor: pointer;
            animation: pulse 2s infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 64, 0.8));
            transition: transform 0.5s ease-out, opacity 0.5s ease-out;
            user-select: none;
            line-height: 1;
        }

        #mainHeart:hover {
            transform: scale(1.1);
        }

        #mainHeart.clicked {
            transform: scale(0) rotate(720deg);
            opacity: 0;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Heart Particles for Explosion */
        .heart-particle {
            position: absolute;
            font-size: 24px;
            color: #ff0040;
            pointer-events: none;
            z-index: 100;
            animation: fly 1.5s ease-out forwards;
        }

        @keyframes fly {
            to {
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* Hint Text */
        .hint {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Gallery Section */
        #gallery {
            display: none;
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        #gallery.visible {
            display: block;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gallery-title {
            text-align: center;
            font-size: 2.5rem;
            color: #ff0040;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 0, 64, 0.5);
        }

        /* Photo Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .photo-container {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid rgba(255, 0, 64, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            aspect-ratio: 1;
        }

        .photo-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 0, 64, 0.4);
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .photo-container:hover img {
            transform: scale(1.1);
        }

        /* Typing Message Container */
        .message-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 64, 0.3);
            border-radius: 20px;
            padding: 40px;
            margin: 40px auto;
            max-width: 800px;
            backdrop-filter: blur(10px);
            min-height: 200px;
        }

        #typingText {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #fff;
            font-style: italic;
        }

        #typingText .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #ff0040;
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Arabic text styling */
        .arabic {
            direction: rtl;
            font-family: 'Arial', sans-serif;
        }

        /* Location Section */
        #location {
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #0a0a0a, #1a0a0a);
            position: relative;
            z-index: 2;
        }

        .location-title {
            font-size: 2.5rem;
            color: #ff0040;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 0, 64, 0.5);
        }

        .place-name {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .map-container {
            max-width: 800px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 0, 64, 0.3);
            box-shadow: 0 0 30px rgba(255, 0, 64, 0.2);
        }

        .map-container iframe {
            width: 100%;
            height: 400px;
            border: none;
            filter: grayscale(20%) contrast(1.1);
        }

        /* Music Toggle Button */
        #musicToggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 0, 64, 0.2);
            border: 2px solid rgba(255, 0, 64, 0.5);
            color: #ff0040;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #musicToggle:hover {
            background: rgba(255, 0, 64, 0.4);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 0, 64, 0.6);
        }

        #musicToggle.playing {
            background: rgba(255, 0, 64, 0.6);
            animation: pulse 2s infinite;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }
            
            #mainHeart {
                font-size: 100px;
            }
            
            #countdown {
                font-size: 1rem;
                padding: 10px 20px;
            }
            
            .countdown-number {
                font-size: 1.5rem;
            }
            
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .message-container {
                padding: 20px;
            }
            
            #typingText {
                font-size: 1.1rem;
            }
            
            .map-container iframe {
                height: 300px;
            }
            
            #musicToggle {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }
            
            .photo-grid {
                grid-template-columns: 1fr;
            }
            
            .gallery-title, .location-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Landing Section -->

        <!-- Countdown Timer -->
        <div id="countdown">

        <!-- Typing Message -->

    <!-- Location Section -->
    <section id="location">
        <h2 class="location-title">Our Special Place ❤️</h2>
        <h3 class="place-name">Hazel Cafe</h3>
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3439.7329859876827!2d29.8769639!3d31.2084976!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14f5c5a6635b09d7%3A0xfc2f2741dbe9f3da!2sHazel%20cafe!5e0!3m2!1sen!2seg!4v1234567890" 
                allowfullscreen=""

    <!-- Audio Element -->
    <audio id="bgMusic" loop>
        <source src="./photos/Amr Diab - We Malo Official Music Video عمرو دياب - وماله.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Music Toggle Button -->
    <button id="musicToggle" onclick="toggleMusic()" title="Toggle Music">❚❚</button>

    <script>
        // Auto-play music on page load
        window.addEventListener('load', () => {
            const music = document.getElementById('bgMusic');
            const musicToggle = document.getElementById('musicToggle');
            music.volume = 0.5;
            music.play().then(() => {
                musicToggle.textContent = '❚❚';
                musicToggle.classList.add('playing');
                isPlaying = true;
            }).catch(e => {
                console.log('Autoplay blocked by browser');
            });
        });
    </script>

    <script>
        /* ==================== Configuration ==================== */
        // Target date: February 11, 2026 at 12:00 AM
        const TARGET_DATE = new Date('February 11, 2026 00:00:00').getTime();
        
        // Typing message content
        const LOVE_MESSAGE = `Happy Birthday ya YASOOOOOOO ❤️

“بابا معندهوش حق و اقفلي” 😄

I hope this year brings you happiness, love, and everything you wish for.

You mean everything to me.
my beloved yasoooo ❤️❤️`;

        /* ==================== Countdown Timer ==================== */
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = TARGET_DATE - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '<div class="countdown-item"><span class="countdown-number">My Everything ❤️ </span></div>';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        /* ==================== Heart Interaction ==================== */
        let heartClicked = false;

        function handleHeartClick() {
            if (heartClicked) return;
            heartClicked = true;

            autoPlayOnInteraction();

            const heart = document.getElementById('mainHeart');
            const rect = heart.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Shrink and hide main heart
            heart.classList.add('clicked');

            // Create exploding heart particles
            createHeartExplosion(centerX, centerY);

            // Trigger fireworks burst from center
            createFireworksBurst(window.innerWidth / 2, window.innerHeight / 2);

            // Reveal gallery after animation
            setTimeout(() => {
                revealGallery();
            }, 800);
        }

        function createHeartExplosion(x, y) {
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'heart-particle';
                particle.textContent = '❤️';
                
                // Random direction and distance
                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 100 + Math.random() * 200;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                const rot = Math.random() * 360;
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.setProperty('--rot', rot + 'deg');
                
                document.body.appendChild(particle);
                
                // Remove after animation
                setTimeout(() => particle.remove(), 1500);
            }
        }

        function revealGallery() {
            const gallery = document.getElementById('gallery');
            gallery.classList.add('visible');
            gallery.scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            // Start typing animation after scroll
            setTimeout(() => {
                typeMessage();
            }, 1000);
        }

        /* ==================== Typing Animation ==================== */
        let typingIndex = 0;
        let isTyping = false;

        function typeMessage() {
            if (isTyping) return;
            isTyping = true;
            
            const typingText = document.getElementById('typingText');
            typingText.innerHTML = '<span class="cursor"></span>';
            
            const chars = LOVE_MESSAGE.split('');
            
            function typeNext() {
                if (typingIndex < chars.length) {
                    const char = chars[typingIndex];
                    const cursor = typingText.querySelector('.cursor');
                    
                    if (char === '\n') {
                        typingText.insertBefore(document.createElement('br'), cursor);
                    } else {
                        const span = document.createElement('span');
                        span.textContent = char;
                        if (/[\u0600-\u06FF]/.test(char)) {
                            span.className = 'arabic';
                        }
                        typingText.insertBefore(span, cursor);
                    }
                    
                    typingIndex++;
                    setTimeout(typeNext, 50);
                } else {
                    // Remove cursor when done
                    const cursor = typingText.querySelector('.cursor');
                    if (cursor) cursor.remove();
                }
            }
            
            typeNext();
        }

        /* ==================== Fireworks Canvas ==================== */
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let fireworks = [];
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Firework {
            constructor(x, y, targetX, targetY, color) {
                this.x = x;
                this.y = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.color = color;
                this.speed = 3;
                this.angle = Math.atan2(targetY - y, targetX - x);
                this.velocity = {
                    x: Math.cos(this.angle) * this.speed,
                    y: Math.sin(this.angle) * this.speed
                };
                this.brightness = Math.random() * 50 + 50;
                this.radius = 2;
                this.distanceTraveled = 0;
                this.distanceToTarget = Math.sqrt(Math.pow(targetX - x, 2) + Math.pow(targetY - y, 2));
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.distanceTraveled = Math.sqrt(Math.pow(this.x - (this.targetX - this.velocity.x), 2) + 
                                                    Math.pow(this.y - (this.targetY - this.velocity.y), 2));
                
                if (this.distanceTraveled >= this.distanceToTarget) {
                    createParticles(this.targetX, this.targetY, this.color);
                    return false;
                }
                return true;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.color}, 100%, ${this.brightness}%)`;
                ctx.fill();
                
                // Trail effect
                ctx.beginPath();
                ctx.moveTo(this.x - this.velocity.x * 3, this.y - this.velocity.y * 3);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsl(${this.color}, 100%, ${this.brightness}%)`;
                ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 4 + 1;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.gravity = 0.05;
            }

            update() {
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.color}, 100%, 50%)`;
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticles(x, y, color) {
            const particleCount = 50;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function createFireworksBurst(x, y) {
            // Create multiple fireworks at once for a burst effect
            const colors = [350, 0, 20, 340]; // Red tones
            for (let i = 0; i < 5; i++) {
                const targetX = x + (Math.random() - 0.5) * 200;
                const targetY = y + (Math.random() - 0.5) * 200;
                const color = colors[Math.floor(Math.random() * colors.length)];
                fireworks.push(new Firework(x, window.innerHeight, targetX, targetY, color));
            }
        }

        // Background fireworks loop
        function launchBackgroundFirework() {
            if (Math.random() < 0.03) { // 3% chance per frame
                const startX = Math.random() * canvas.width;
                const targetX = Math.random() * canvas.width;
                const targetY = Math.random() * (canvas.height / 2);
                const color = Math.random() * 60 + 330; // Red to pink range
                fireworks.push(new Firework(startX, canvas.height, targetX, targetY, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            launchBackgroundFirework();
            
            // Update fireworks
            for (let i = fireworks.length - 1; i >= 0; i--) {
                if (!fireworks[i].update()) {
                    fireworks.splice(i, 1);
                } else {
                    fireworks[i].draw();
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }
        }

        animate();

        /* ==================== Music Control ==================== */
        const music = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        let isPlaying = false;
        let hasInteracted = false;

        function autoPlayOnInteraction() {
            if (hasInteracted) return;
            hasInteracted = true;
            music.play().then(() => {
                musicToggle.textContent = '❚❚';
                musicToggle.classList.add('playing');
                isPlaying = true;
            }).catch(e => console.log('Play after interaction failed:', e));
        }

        // Listen for first user interaction
        ['click', 'keydown', 'touchstart'].forEach(event => {
            document.addEventListener(event, autoPlayOnInteraction, { once: true });
        });

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicToggle.textContent = '▶';
                musicToggle.classList.remove('playing');
                isPlaying = false;
            } else {
                music.play().then(() => {
                    musicToggle.textContent = '❚❚';
                    musicToggle.classList.add('playing');
                    isPlaying = true;
                }).catch(e => {
                    console.log('Audio play failed:', e);
                    alert('Please interact with the page first to enable audio!');
                });
            }
        }

        // Volume set on DOM load already; enhanced autoplay via interaction

        /* ==================== Additional Effects ==================== */
        // Create floating hearts in background occasionally
        function createFloatingHeart() {
            if (Math.random() < 0.01) {
                const heart = document.createElement('div');
                heart.textContent = '❤️';
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.opacity = '0.3';
                heart.style.pointerEvents = 'none';
                heart.style.animation = 'float 10s linear forwards';
                heart.style.zIndex = '0';
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 10000);
            }
        }

        // Add float animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                to {
                    transform: translateY(-110vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        setInterval(createFloatingHeart, 100);
    </script>
</body>
</html>
